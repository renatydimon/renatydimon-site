<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renaty Dimon</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ambar-claro: #E8A84C;
    --ambar-medio: #C39B37;
    --ambar-escuro: #8B6020;
    --preto: #111111;
    --preto-quente: #1C1A17;
    --branco: #FFFFFF;
    --branco-corpo: rgba(255,255,255,0.65);
    --branco-sutil: rgba(255,255,255,0.35);
  }

  html, body {
    height: 100%;
    background: var(--preto);
    color: var(--branco);
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ── PARTÍCULAS ── */
  #particulas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LINHA TOPO ── */
  .topo-linha {
    width: 100%;
    height: 3px;
    background: linear-gradient(to right, transparent, var(--ambar-medio), transparent);
    position: relative;
    z-index: 1;
  }

  /* ── WRAPPER CENTRAL ── */
  .wrapper {
    min-height: calc(100vh - 3px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 48px 24px 24px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* ── LOGO ── */
  .logo-circulo {
    width: 220px;
    height: auto;
    object-fit: contain;
    mix-blend-mode: multiply;
    filter: brightness(0.95);
    margin-bottom: 12px;
  }

  /* ── NOME ── */
  .entrada-nome {
    font-size: clamp(18px, 2.5vw, 28px);
    font-weight: 600;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 20px;
  }

  /* ── TAG ── */
  .entrada-tag {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ambar-medio);
    margin-top: 10px;
    margin-bottom: 32px;
  }

  /* ── TÍTULO ── */
  .entrada-titulo {
    font-size: clamp(34px, 5.5vw, 64px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -1.5px;
    color: var(--branco);
    max-width: 700px;
    margin-bottom: 16px;
  }

  .entrada-titulo .gold {
    color: var(--ambar-claro);
    text-shadow: 0 0 30px rgba(232,168,76,0.35), 0 0 60px rgba(232,168,76,0.15);
  }

  /* ── SUBTÍTULO ── */
  .entrada-sub {
    font-size: clamp(16px, 2vw, 20px);
    font-weight: 600;
    color: rgba(255,255,255,0.80);
    max-width: 440px;
    margin-bottom: 64px;
    line-height: 1.7;
  }

  /* ── BOTÕES ── */
  .botoes {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 360px;
  }

  /* Botão primário — O Método */
  .btn-metodo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--ambar-medio);
    color: var(--preto);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 20px 40px;
    text-decoration: none;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-metodo::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .btn-metodo:hover::before { opacity: 1; }
  .btn-metodo:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(195,155,55,0.4); }

  /* Botão secundário — Quem sou */
  .btn-quem {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: transparent;
    color: var(--ambar-medio);
    border: 1px solid rgba(195,155,55,0.4);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 20px 40px;
    text-decoration: none;
    transition: all 0.25s ease;
  }

  .btn-quem:hover {
    border-color: var(--ambar-medio);
    background: rgba(195,155,55,0.07);
    transform: translateY(-2px);
  }

  /* ── DIVISOR ENTRE BOTÕES ── */
  .ou {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--branco-sutil);
  }

  /* ── ASSINA ── */
  .entrada-assina {
    margin-top: 32px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
  }

  /* ── RODAPÉ ── */
  footer {
    position: relative;
    z-index: 1;
    padding: 16px 24px 24px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  .footer-logo {
    width: 200px;
    height: auto;
    object-fit: contain;
    mix-blend-mode: multiply;
    filter: brightness(0.95);
    opacity: 0.9;
  }

  /* ── RESPONSIVO ── */
  @media (max-width: 480px) {
    .botoes { max-width: 100%; }
    .btn-metodo, .btn-quem { font-size: 15px; padding: 18px 28px; }
  }
</style>
</head>
<body>

<canvas id="particulas"></canvas>

<div class="topo-linha"></div>

<div class="wrapper">

  <div class="entrada-nome">Renaty Dimon</div>

  <!-- Título -->
  <h1 class="entrada-titulo"><span class="gold">Alta performance</span><br>com leveza.</h1>
  <div class="entrada-tag">Mentalidade Inteligente</div>

  <!-- Subtítulo -->
  <p class="entrada-sub">Para o empresário que já domina a estratégia — e está pronto para o que opera além dela.</p>

  <!-- Botões -->
  <div class="botoes">
    <a href="pagina-de-vendas.html" class="btn-metodo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      Conhecer o método
    </a>
    <a href="quem-sou.html" class="btn-quem">
      Quem é Renaty
    </a>
  </div>

  <p class="entrada-assina">⚜️ O extraordinário já está disponível. Agora é só escolher.</p>

</div>

<!-- Rodapé -->
<footer>
  <img src="Logo/pdf/logo novo 34.png" alt="Renaty Dimon" class="footer-logo">
</footer>

<!-- ── PARTÍCULAS ── -->
<script>
(function() {
  const canvas = document.getElementById('particulas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function createParticle() {
    return {
      x: rand(0, W), y: rand(0, H),
      r: rand(0.6, 2.2),
      vx: rand(-0.2, 0.2), vy: rand(-0.35, -0.08),
      alpha: rand(0.25, 0.7),
      color: Math.random() > 0.5 ? '195,155,55' : '232,168,76'
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: 150 }, createParticle);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.y < -5 || p.x < -5 || p.x > W + 5) Object.assign(p, createParticle(), { y: H + 5 });
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init(); draw();
})();
</script>

</body>
</html>
